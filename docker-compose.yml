services:
  postgres:
    image: postgres:16-alpine
    container_name: weather_favorites_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: weather_password
      POSTGRES_DB: weather_dashboard
    ports:
      - "5432:5432"
    volumes:
      - weather_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: weather_favorites_server
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://weather_user:weather_password@postgres:5432/weather_dashboard
      CLIENT_ORIGIN: http://localhost:5173
      WEATHER_REFRESH_INTERVAL_MS: 600000
      STALE_AFTER_MINUTES: 30
      OPEN_METEO_TIMEOUT_MS: 20000
      OPEN_METEO_FORCE_WEATHER_FAIL: "false"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/server/src
      - ./server/tsconfig.json:/app/server/tsconfig.json

volumes:
  weather_postgres_data: